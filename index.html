            function setActiveNav(filter) {
                navLinks.forEach(a => a.classList.remove('active'));
                const matchNav = document.querySelector(`.nav-links a[data-nav="${filter}"]`);
                if (matchNav) matchNav.classList.add('active');
                catLinks.forEach(a => a.classList.remove('active-cat'));
                const matchCat = document.querySelector(`.sidebar .category-list li a[data-cat="${filter}"]`);
                if (matchCat) matchCat.classList.add('active-cat');
            }
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const filter = this.getAttribute('data-nav');
                    setActiveNav(filter);
                    renderGuides(filter, currentSearch);
                    searchInput.value = currentSearch;
                    // 移动端关闭侧边栏
                    if (window.innerWidth <= 900) {
                        sidebar.classList.remove('mobile-open');
                    }
                });
            });
            catLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const filter = this.getAttribute('data-cat');
                    setActiveNav(filter);
                    renderGuides(filter, currentSearch);
                    searchInput.value = currentSearch;
                });
            });

            // ============ 主题切换 ============
            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
                localStorage.setItem('yihuan-theme', theme);
            }
            const savedTheme = localStorage.getItem('yihuan-theme') || 'light';
            applyTheme(savedTheme);
            themeToggle.addEventListener('click', function() {
                const current = document.documentElement.getAttribute('data-theme');
                applyTheme(current === 'dark' ? 'light' : 'dark');
            });

            // ============ 移动端汉堡菜单 ============
            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                sidebar.classList.toggle('mobile-open');
            });
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 900 && sidebar.classList.contains('mobile-open')) {
                    if (!sidebar.contains(e.target) && e.target !== hamburgerBtn && !hamburgerBtn.contains(e
                            .target)) {
                        sidebar.classList.remove('mobile-open');
                    }
                }
            });
            window.addEventListener('resize', function() {
                if (window.innerWidth > 900) {
                    sidebar.classList.remove('mobile-open');
                }
            });

            // ============ 初始渲染 ============
            renderGuides('all', '');
            setActiveNav('all');

            console.log('✅ 异环攻略网站已就绪！共加载 ' + guidesData.length + ' 篇攻略。');
            console.log('💡 功能：搜索 | 分类筛选 | 详情弹窗 | 暗色主题 | 响应式布局');
        })();
    </script>
</body>
</html>
